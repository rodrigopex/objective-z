sample:
  description: GPIO output and input with interrupt callback
  name: ObjZ GPIO Demo
common:
  tags: objz gpio
  platform_allow:
    - mps2/an385
  integration_platforms:
    - mps2/an385
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "=== GPIO Demo ==="
      - "LED configured"
      - "LED on"
      - "LED off"
      - "LED toggled"
      - "=== GPIO Demo complete ==="
tests:
  sample.objz.gpio_demo:
    tags: objz gpio

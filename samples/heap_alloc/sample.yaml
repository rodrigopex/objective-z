sample:
  description: Heap-based allocation with allocWithHeap
  name: ObjZ Heap Alloc Demo
common:
  tags: objz
  platform_allow:
    - mps2/an385
  integration_platforms:
    - mps2/an385
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "App heap initialized"
      - "Local heap initialized"
      - "=== Heap Allocation Demo ==="
      - "Sensor allocated from app heap, value=42"
      - "Sensor allocated from user sys heap, value=84"
      - "Sensor dealloc.*42"
      - "Sensor dealloc.*84"
      - "Sensor allocated from system heap, value=99"
      - "Sensor dealloc.*99"
      - "Slab sensor value=7"
      - "Sensor dealloc.*7"
      - "=== Demo complete ==="
tests:
  sample.objz.heap_alloc:
    tags: objz heap

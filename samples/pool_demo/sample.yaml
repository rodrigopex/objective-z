sample:
  description: Transpiled pool demo with loop and autoreleasepool
  name: ObjZ Pool Demo
common:
  tags: objz
  integration_platforms:
    - mps2/an385
    - qemu_riscv32
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "=== Static Pool Demo ==="
      - "pool alloc sensor value=1"
      - "Sensor dealloc"
      - "pool alloc sensor value=2"
      - "Sensor dealloc"
      - "pool alloc sensor value=3"
      - "Sensor dealloc"
      - "=== Demo complete ==="
tests:
  sample.objz.pool_demo:
    tags: objz pool

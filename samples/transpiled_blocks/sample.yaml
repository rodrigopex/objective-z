sample:
  description: Transpiled blocks (closures) demo
  name: Transpiled Blocks Demo
common:
  tags: transpiled blocks
  integration_platforms:
    - mps2/an385
    - qemu_riscv32
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "=== Blocks Demo ==="
      - "Global block: 42"
      - "Mutated counter: 3"
      - "Nested block: 77"
      - "Sensor sum: 90"
      - "=== Blocks Demo Complete ==="
tests:
  sample.transpiled_blocks:
    tags: transpiled blocks

sample:
  description: ARC (Automatic Reference Counting) demo
  name: ObjZ ARC Demo
common:
  tags: objz
  # RVO-dependent output ordering requires ARM Thumb-2 marker
  platform_allow:
    - mps2/an385
  integration_platforms:
    - mps2/an385
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "=== ARC Memory Management Demo ==="
      - "singleton refreshRate=60 same=yes"
      - "Sensor created, value=42"
      - "Sensor dealloc"
      - "@autoreleasepool test"
      - "Sensor dealloc"
      - "=== Demo main complete ==="
      - "=== Demo Extra thread started ==="
      - "Driver created"
      - "Sensor dealloc"
      - "Driver dealloc"
tests:
  sample.objz.arc_demo:
    tags: objz arc

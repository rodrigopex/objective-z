sample:
  description: Zbus integration with ObjC producer and C consumer
  name: ObjZ Zbus Demo
common:
  tags: objz
  platform_allow:
    - mps2/an385
  integration_platforms:
    - mps2/an385
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "Accelerometer data x=\\d+,y=\\d+,z=\\d+"
      - "Producer: Received 10 acknowledgments from Consumer"
tests:
  sample.objz.zbus:
    tags: objz zbus

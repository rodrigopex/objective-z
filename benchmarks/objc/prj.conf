CONFIG_OBJZ=y
CONFIG_PRINTK=y

# Cycle-accurate timing via DWT counter
CONFIG_TIMING_FUNCTIONS=y

# Minimize jitter during measurement
CONFIG_TIMESLICING=n
CONFIG_PM=n

# Required for OZArray/OZDictionary item pools
CONFIG_SYS_MEM_BLOCKS=y

# Heap allocation support (allocWithHeap:)
CONFIG_OBJZ_HEAP=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Stack for benchmark iterations
CONFIG_MAIN_STACK_SIZE=8192

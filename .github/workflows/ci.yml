# SPDX-License-Identifier: Apache-2.0
name: Transpiler CI

on:
  push:
    branches: [main, feature/transpiler]
  pull_request:
    branches: [main]

jobs:
  # Python tests (transpiler unit + golden tests)
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20
          sudo ln -sf /usr/bin/clang-20 /usr/local/bin/clang

      - name: Install dependencies
        run: pip install pytest pytest-cov jinja2 tree-sitter tree-sitter-objc

      - name: Run transpiler tests with coverage
        run: >
          PYTHONPATH=tools
          python3 -m pytest tools/oz_transpile/tests/ -v
          --cov=oz_transpile --cov-report=xml

      - name: Upload Python coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: false

  # Behavior tests — compiler × optimization matrix
  behavior-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        opt: [O0, O2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20

      - name: Install Python dependencies
        run: pip install pytest jinja2 tree-sitter tree-sitter-objc

      - name: Run behavior tests
        run: >
          PYTHONPATH=tools
          python3 -m pytest tests/behavior/ -v
          --compiler=${{ matrix.compiler }}
          --opt=${{ matrix.opt }}

  # Sanitizer run (ASan + UBSan)
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20

      - name: Install Python dependencies
        run: pip install pytest jinja2 tree-sitter tree-sitter-objc

      - name: Run with AddressSanitizer + UBSan
        run: >
          PYTHONPATH=tools
          python3 -m pytest tests/behavior/ -v
          --compiler=gcc
          --opt=O0
          --sanitize=address,undefined

  # C coverage (gcov)
  c-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20 gcovr

      - name: Install Python dependencies
        run: pip install pytest jinja2 tree-sitter tree-sitter-objc

      - name: Run behavior tests with coverage
        run: >
          PYTHONPATH=tools
          python3 -m pytest tests/behavior/ -v
          --compiler=gcc
          --opt=O0
          --cflags=--coverage
          --ldflags=--coverage

      - name: Generate C coverage report
        run: gcovr --xml -o c_coverage.xml --filter='.*\.c'

      - name: Upload C coverage
        uses: codecov/codecov-action@v4
        with:
          files: c_coverage.xml
          flags: c-transpiled
          fail_ci_if_error: false

  # Adapted upstream tests
  adapted-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20

      - name: Install Python dependencies
        run: pip install pytest jinja2 tree-sitter tree-sitter-objc

      - name: Run adapted upstream tests
        run: PYTHONPATH=tools python3 -m pytest tests/adapted/ -v

  # PAL (Platform Abstraction Layer) tests
  pal-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pytest

      - name: Run PAL tests
        run: python3 -m pytest tests/pal/ -v

  # LeakSanitizer (standalone LSan)
  # continue-on-error: pre-existing OZQ31 division ARC gap causes leaks
  leak-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20

      - name: Install Python dependencies
        run: pip install pytest jinja2 tree-sitter tree-sitter-objc

      - name: Run behavior tests with LeakSanitizer
        run: >
          PYTHONPATH=tools
          python3 -m pytest tests/behavior/ -v
          --compiler=gcc
          --opt=O0
          --check-leaks

  # Hardware build verification (compile-only for ARM + RISC-V)
  hw-build-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        board: [mps2/an385, qemu_riscv32]
    env:
      ZEPHYR_SDK_INSTALL_DIR: /home/runner/zephyr-sdk-1.0.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gperf device-tree-compiler gcc-multilib g++-multilib

      - name: Install west
        run: pip install west

      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: /home/runner/zephyr-sdk-1.0.0
          key: zephyr-sdk-1.0.0-${{ matrix.board }}

      - name: Install Zephyr SDK
        run: |
          if [ ! -d "/home/runner/zephyr-sdk-1.0.0" ]; then
            wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v1.0.0/zephyr-sdk-1.0.0_linux-x86_64_minimal.tar.xz
            tar xf zephyr-sdk-1.0.0_linux-x86_64_minimal.tar.xz -C /home/runner
            /home/runner/zephyr-sdk-1.0.0/setup.sh -t arm-zephyr-eabi -t riscv64-zephyr-elf -h -c
          fi

      - name: Initialize workspace
        run: |
          west init -l .
          west update --narrow --fetch-opt=--depth=1

      - name: Install system dependencies (Clang for transpiler)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20

      - name: Install Zephyr deps
        run: |
          pip install -r ../zephyr/scripts/requirements-base.txt natsort tabulate
          pip install jinja2 tree-sitter tree-sitter-objc

      - name: Build sample (compile only)
        run: PYTHONPATH=tools west build -b ${{ matrix.board }} samples/hello_world

      - name: Verify PAL inlining (ARM only)
        if: contains(matrix.board, 'mps2')
        run: |
          OBJDUMP=$(find $ZEPHYR_SDK_INSTALL_DIR -name "arm-zephyr-eabi-objdump" | head -1)
          PAL_CALLS=$($OBJDUMP -d build/zephyr/zephyr.elf | grep -c 'bl.*oz_slab_alloc\|bl.*oz_atomic\|bl.*oz_spin' || true)
          if [ "$PAL_CALLS" -ne 0 ]; then
            echo "FAIL: PAL functions not inlined ($PAL_CALLS call sites found)"
            $OBJDUMP -d build/zephyr/zephyr.elf | grep 'bl.*oz_'
            exit 1
          fi
          echo "PASS: All PAL functions inlined (zero call sites)"

  # Zephyr integration tests (native_sim)
  zephyr-integration:
    runs-on: ubuntu-latest
    env:
      ZEPHYR_SDK_INSTALL_DIR: /home/runner/zephyr-sdk-1.0.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gperf device-tree-compiler gcc-multilib g++-multilib

      - name: Install west
        run: pip install west

      - name: Cache Zephyr SDK
        uses: actions/cache@v4
        with:
          path: /home/runner/zephyr-sdk-1.0.0
          key: zephyr-sdk-1.0.0-arm

      - name: Install Zephyr SDK (minimal + ARM only)
        run: |
          if [ ! -d "/home/runner/zephyr-sdk-1.0.0" ]; then
            wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v1.0.0/zephyr-sdk-1.0.0_linux-x86_64_minimal.tar.xz
            tar xf zephyr-sdk-1.0.0_linux-x86_64_minimal.tar.xz -C /home/runner
            /home/runner/zephyr-sdk-1.0.0/setup.sh -t arm-zephyr-eabi -h -c
          fi

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update --narrow --fetch-opt=--depth=1

      - name: Install Zephyr Python deps
        run: |
          pip install -r ../zephyr/scripts/requirements-base.txt \
                      -r ../zephyr/scripts/requirements-build-test.txt \
                      natsort tabulate

      - name: Build and run tests on native_sim
        run: west twister -T tests/zephyr/ -p native_sim --inline-logs


  # Generated file freshness check
  generated-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-20

      - name: Install Python dependencies
        run: pip install jinja2 tree-sitter tree-sitter-objc

      - name: Regenerate Zephyr test sources
        run: PYTHONPATH=tools python scripts/regen_zephyr_tests.py

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet tests/zephyr/generated/; then
            echo "FAIL: Transpiled test sources are stale. Run:"
            echo "  PYTHONPATH=tools python scripts/regen_zephyr_tests.py"
            echo "and commit the updated files."
            git diff tests/zephyr/generated/
            exit 1
          fi
